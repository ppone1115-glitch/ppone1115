<index. html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물 한살이 백과 사전 🐾</title>
    <style>
        /* 기본 스타일 및 폰트 */
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap');
        
        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: #f0fdf4; /* 연한 초록빛 배경 (자연 느낌) */
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 메인 컨테이너 */
        .container {
            max-width: 800px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            text-align: center;
            border: 3px solid #bbf7d0;
        }

        h1 {
            color: #16a34a;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* 검색창 영역 */
        .search-box {
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 60%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid #cbd5e1;
            border-radius: 30px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #22c55e;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            background-color: #22c55e;
            color: white;
            border: none;
            border-radius: 30px;
            margin-left: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #16a34a;
        }

        /* 안내 문구 */
        .hint-text {
            color: #888;
            font-size: 0.95rem;
            margin-top: 10px;
        }

        /* 결과 화면 디자인 */
        .result-container {
            display: none; /* 기본적으로는 숨김 */
            margin-top: 20px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .animal-title {
            font-size: 1.8rem;
            color: #1e3a8a;
            margin-bottom: 20px;
            display: inline-block;
            background: #dbeafe;
            padding: 5px 20px;
            border-radius: 15px;
        }

        /* 흐름도(타임라인) 구조 */
        .timeline {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            flex-wrap: wrap;
            margin-top: 30px;
            position: relative;
        }

        .step {
            flex: 1;
            min-width: 160px;
            margin: 10px;
            padding: 15px;
            background: #f8fafc;
            border-radius: 15px;
            border: 2px solid #e2e8f0;
            position: relative;
        }

        .step-num {
            background: #22c55e;
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin: 0 auto 10px auto;
        }

        /* SVG 선화 일러스트 박스 */
        .icon-box {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-box svg {
            width: 100%;
            height: 100%;
        }

        .step-name {
            font-weight: bold;
            font-size: 1.2rem;
            color: #334155;
            margin-bottom: 8px;
        }

        .step-desc {
            font-size: 0.95rem;
            color: #64748b;
            line-height: 1.5;
            word-break: keep-all;
        }

        /* 에러 메시지 */
        .error-message {
            display: none;
            color: #ef4444;
            font-weight: bold;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

    // 검색 기능
    function searchAnimal() {
        const input = document.getElementById("animalInput").value.trim();
        const resultContainer = document.getElementById("resultContainer");
        const errorMessage = document.getElementById("errorMessage");
        const animalTitle = document.getElementById("animalTitle");
        const timeline = document.getElementById("timeline");

        // 초기화
        resultContainer.style.display = "none";
        errorMessage.style.display = "none";
        timeline.innerHTML = "";

        if (animalData[input]) {
            // 데이터가 있을 때 화면에 표시
            const data = animalData[input];
            animalTitle.innerText = data.title;

            data.steps.forEach((step, index) => {
                const stepHtml = `
                    <div class="step">
                        <div class="step-num">${index + 1}</div>
                        <div class="icon-box">${step.svg}</div>
                        <div class="step-name">${step.name}</div>
                        <div class="step-desc">${step.desc}</div>
                    </div>
                `;
                timeline.innerHTML += stepHtml;
            });

            resultContainer.style.style = "block";
            resultContainer.style.display = "block";
        } else if (input !== "") {
            // 데이터가 없을 때 에러 메시지
            errorMessage.style.display = "block";
        }
    }

    // 엔터키 입력 처리
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            searchAnimal();
        }
    }
